<!DOCTYPE html>
<html>
<body>

<h1>🏔️ Manager Skoków ONLINE</h1>

<button onclick="login()">🔑 Zaloguj GitHub</button>

<input id="name" placeholder="Twoja nazwa">
<button onclick="saveName()">Zapisz</button>

<button onclick="train()">Trening</button>
<button onclick="comp()">Zawody</button>
<button onclick="ranking()">Ranking</button>

<pre id="out"></pre>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const SUPABASE_URL = "TU_URL";
const SUPABASE_KEY = "TU_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let player = null;

// 🔑 LOGIN GITHUB
async function login(){
  await supabase.auth.signInWithOAuth({
    provider: 'github'
  });
}

// po powrocie z logowania
async function loadUser(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if (!user) return;

  let { data: existing } = await supabase
    .from("players")
    .select("*")
    .eq("id", user.id)
    .single();

  if (!existing){
    player = {
      id: user.id,
      name: "Gracz",
      skill: 50,
      form: 50,
      points: 0
    };
    await supabase.from("players").insert(player);
  } else {
    player = existing;
  }
}

async function savePlayer(){
  await supabase.from("players").upsert(player);
}

window.saveName = async function(){
  player.name = document.getElementById("name").value;
  await savePlayer();
};

window.train = async function(){
  player.skill += Math.random()*2;
  player.form += Math.random()*5-2;
  await savePlayer();
  out("Trening OK");
};

function jump(skill, form){
  return 90 + skill*0.4 + form*0.2 + (Math.random()*10-5);
}

window.comp = async function(){
  let { data } = await supabase.from("players").select("*");

  let results = data.map(p=>({
    id:p.id,
    name:p.name,
    score:jump(p.skill,p.form)
  }));

  results.sort((a,b)=>b.score-a.score);

  results.forEach((r,i)=>{
    if (r.id === player.id){
      player.points += (10 - i > 0 ? 10 - i : 1);
    }
  });

  await savePlayer();

  let txt="";
  results.forEach((r,i)=>{
    txt+=(i+1)+". "+r.name+" "+r.score.toFixed(2)+"m\n";
  });

  out(txt);
};

window.ranking = async function(){
  let { data } = await supabase.from("players").select("*");

  data.sort((a,b)=>b.points-a.points);

  let txt="RANKING:\n";
  data.forEach((p,i)=>{
    txt+=(i+1)+". "+p.name+" ("+p.points+" pkt)\n";
  });

  out(txt);
};

function out(t){
  document.getElementById("out").innerText=t;
}

loadUser();
</script>

</body>
</html>
